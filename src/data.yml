  answer: 1
  faster_factor: 9.6
  machine: AMD Ryzen 9
  code_url: https://github.com/hgminh95/fast/blob/main/bench/memory/tlb_shootdown.cpp
  explain: |
    When one core modifies page tables (e.g., via memory allocation/deallocation), it must
    invalidate TLB entries on other cores that might have cached those mappings. This is called
    a TLB shootdown and requires an inter-processor interrupt (IPI), which is expensive.

    In the second example, thread 2 constantly allocates and frees memory, causing frequent
    page table changes. The OS sends TLB shootdown IPIs to other cores, disrupting thread 1's
    TLB and forcing expensive page table walks.

