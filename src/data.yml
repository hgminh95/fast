- title: Pointer Chasing
  topic: CPU
  code1: |
    Node* p = head;
    while (p) {
      sum += p->value;
      p = p->next;
    }
  code2: |
    for (auto i = 0u; i < arr.size(); ++i) {
      sum += arr[i];
    }
  answer: 2
  faster_factor: 293
  machine: AMD Ryzen 9
  code_url: https://github.com/hgminh95/fast/blob/main/bench/cpu/pointer_chasing.cpp
  explain: |
    Pointer chasing is the worst case for modern CPUs. Each node's address depends on reading
    the previous node's `next` pointer, creating a strict serial dependency chain. The CPU
    cannot prefetch ahead because it doesn't know where the next node is until the current
    load completes.

    With randomly shuffled nodes, each dereference likely causes a cache miss (~100ns on
    modern hardware), and these misses cannot be overlapped. Array traversal, on the other
    hand, is perfectly sequential and predictable, allowing the hardware prefetcher to stay
    far ahead and hiding all memory latency.

    This is why cache-friendly data structures (arrays, vectors) dramatically outperform
    pointer-heavy structures (linked lists, trees) for traversal.

    References:

    - [Wikipedia - Pointer Chasing](https://en.wikipedia.org/wiki/Pointer_chasing)
    - [Algorithmica - Memory-Level Parallelism](https://en.algorithmica.org/hpc/cpu-cache/mlp/)
  code1_zig: |
