    On some older x86 CPUs (Sandy Bridge through Haswell), the `popcnt` instruction has a
    false output dependency: the CPU tracks a dependency on the destination register even
    though the instruction doesn't actually read it. This serializes consecutive `popcnt`
    instructions that use the same accumulator.

