questions:
- title: Memory vs Compute
  topic: Memory
  code1: |
    struct Foo {
      int values[30];
      int cached_bar{0};

      int bar() {
        if (cached_bar == 0) {
          for (int i = 0; i < 30; ++i) {
            cached_bar += values[i] * i;
          }
        }

        return cached_bar;
      }
    };

    std::vector<Foo> arr(1'000'000);

    for (auto &foo : arr) {
      Use(foo.bar());
    }
  code2: |
    struct Foo {
      int values[30];

      int bar() {
        int res{0};
        for (int i = 0; i < 30; ++i) {
          res += values[i] * i;
        }
        return res;
      }
    };

    std::vector<Foo> arr(1'000'000);

    for (auto &foo : arr) {
      Use(foo.bar());
    }
  answer: 2
  faster_factor: 1.24
  code_url: https://github.com/hgminh95/fast/blob/main/bench/memory/vs_compute.cpp
  machine: AMD Ryzen 9
  explain: |
    Memory access is often the bottleneck in modern programs, not computation. CPUs are fast, but
    waiting for data from memory is slow.

    In this example, the cached version stores the computed result. While this saves computation,
    accessing the cached value still requires a memory read of `cached_bar` (which makes the struct
    larger and thus fewer fit in a cache line). The recomputation version, on the other hand, is
    pure computation on data already loaded into registers, which the CPU handles very efficiently.

    References:

    - [What Every Programmer Should Know About Memory](https://people.freebsd.org/~lstewart/articles/cpumemory.pdf)
  code1_zig: |
    const FooWithCache = struct {
        values: [30]i32,
        cached_bar: i32 = 0,

        fn bar(self: *FooWithCache) i32 {
            if (self.cached_bar == 0) {
                for (self.values, 0..) |v, i| {
                    self.cached_bar +%= v *% @intCast(i);
                }
            }
            return self.cached_bar;
        }
    };

    var arr: []FooWithCache = // 1'000'000 elems

    for (arr) |*foo| use(foo.bar());
  code2_zig: |
    const FooWithoutCache = struct {
        values: [30]i32,

        fn bar(self: *const FooWithoutCache) i32 {
            var res: i32 = 0;
            for (self.values, 0..) |v, i| {
                res +%= v *% @intCast(i);
            }
            return res;
        }
    };

    var arr: []FooWithoutCache = // 1'000'000 elems

    for (arr) |*foo| use(foo.bar());
- title: TLB Miss
  topic: Memory
  code1: |
    for (auto i = 0u; i < arr.size(); ++i) {
      sum += arr[i];
    }
  code2: |
    constexpr int PAGE_STRIDE = 4096 / sizeof(int);

    int idx = 0;
    for (auto i = 0u; i < arr.size(); ++i) {
      sum += arr[idx];
      idx = (idx + PAGE_STRIDE) % arr.size();
    }
  answer: 1
  faster_factor: 11.5
  machine: AMD Ryzen 9
  code_url: https://github.com/hgminh95/fast/blob/main/bench/memory/tlb_miss.cpp
  explain: |
    The CPU uses a Translation Lookaside Buffer (TLB) to cache virtual-to-physical address translations.
    Sequential access accesses pages in order, so the TLB entries stay cached. Striding by one page
    per access rapidly exhausts the TLB, causing TLB misses on every access.

    Each TLB miss requires a page table walk, which can take hundreds of cycles. The TLB is typically
    small (e.g., 64 entries for L1 dTLB), so accessing many different pages quickly evicts entries.

    References:

    - [Wikipedia - Translation Lookaside Buffer](https://en.wikipedia.org/wiki/Translation_lookaside_buffer)
    - [Algorithmica - Virtual Memory](https://en.algorithmica.org/hpc/cpu-cache/paging/)
  code1_zig: |
    for (arr) |x| {
        sum +%= x;
    }
  code2_zig: |
    const PAGE_STRIDE = 4096 / @sizeOf(i32);

    var idx: usize = 0;
    for (0..arr.len) |_| {
        sum +%= arr[idx];
        idx = (idx + PAGE_STRIDE) % arr.len;
    }
