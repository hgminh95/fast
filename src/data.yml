  answer: 2
  faster_factor: 36
  machine: AMD Ryzen 9
  code_url: https://github.com/hgminh95/fast/blob/main/bench/memory/true_sharing.cpp
  explain: |
    Unlike false sharing, true sharing happens when multiple threads genuinely need to read/write
    the same variable. In the first example, every thread contends on the same atomic counter,
    causing the cache line to bounce between cores on every operation (MESI protocol invalidations).

    The fix is to accumulate locally and only update the shared counter once at the end, reducing
    the number of cross-core cache line transfers from N to 1 per thread.

    References:

    - [Wikipedia - Cache Coherence](https://en.wikipedia.org/wiki/Cache_coherence)
    - [Wikipedia - MESI Protocol](https://en.wikipedia.org/wiki/MESI_protocol)
  code1_zig: |
    var counter = std.atomic.Value(i32).init(0);

    // Run in 4 threads
    for (0..100_000) |_| {
        _ = counter.fetchAdd(1, .monotonic);
    }
  code2_zig: |
    var counter = std.atomic.Value(i32).init(0);

    // Run in 4 threads
    var local: i32 = 0;
    for (0..100_000) |_| {
        local += 1;
    }
    _ = counter.fetchAdd(local, .monotonic);
