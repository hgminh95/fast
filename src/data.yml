    cudaMemcpy(d_data, h_data, size, cudaMemcpyHostToDevice);
    kernel<<<blocks, threads>>>(d_data);
    cudaMemcpy(h_data, d_data, size, cudaMemcpyDeviceToHost);
    cudaMemcpy(d_data, h_data, size, cudaMemcpyHostToDevice);
    kernel2<<<blocks, threads>>>(d_data);
  answer: 1
  faster_factor: 10
  explain: |
    PCIe bandwidth (~32 GB/s for PCIe 4.0 x16) is much lower than GPU memory bandwidth
    (~900 GB/s for HBM2e). Every host-device transfer is a bottleneck.

    Minimize data movement by keeping data on the GPU as long as possible. Even if a kernel
    is less efficient on the GPU than CPU, avoiding the transfer may make it worthwhile to
    compute on the GPU anyway.

    References:

    - [NVIDIA - Data Transfer Optimization](https://docs.nvidia.com/cuda/cuda-c-best-practices-guide/index.html#data-transfer-between-host-and-device)
- title: Coalesced Access
  topic: GPU
  code1: |
    __global__ void kernel(float* data, int N) {
      int idx = blockIdx.x * blockDim.x + threadIdx.x;
      data[idx] += 1.0f;
    }
  code2: |
    __global__ void kernel(float* data, int N, int stride) {
      int idx = (blockIdx.x * blockDim.x + threadIdx.x) * stride;
      data[idx] += 1.0f;
    }
  answer: 1
  faster_factor: 10
  explain: |
    GPU memory is accessed in large transactions (32/64/128 bytes). When threads in a warp
    access consecutive addresses, the hardware coalesces these into a single memory transaction.

    Strided access forces multiple transactions per warp, wasting bandwidth. In the worst case,
    32 threads each require a separate 128-byte transaction, achieving only 4/128 = 3% bandwidth
    utilization.

    References:

    - [NVIDIA - Memory Coalescing](https://docs.nvidia.com/cuda/cuda-c-best-practices-guide/index.html#coalesced-access-to-global-memory)
- title: Misaligned Access
  topic: GPU
  code1: |
    __global__ void kernel(float* data) {
      int idx = blockIdx.x * blockDim.x + threadIdx.x;
      data[idx] += 1.0f;
    }
  code2: |
    __global__ void kernel(float* data) {
      int idx = blockIdx.x * blockDim.x + threadIdx.x;
      data[idx + 1] += 1.0f;
    }
  answer: 1
  faster_factor: 2
  explain: |
    GPU memory transactions are aligned to segment boundaries (32/64/128 bytes). When a warp's
    access pattern crosses a segment boundary due to misalignment, it requires an additional
    transaction.

    For example, 32 threads reading 4 bytes each = 128 bytes. If aligned, this is one 128-byte
    transaction. If misaligned by even one element, the data spans two segments, requiring two
    transactions and doubling the bandwidth cost.

    References:

    - [NVIDIA - Misaligned Access](https://docs.nvidia.com/cuda/cuda-c-best-practices-guide/index.html#misaligned-data-accesses)
- title: The Swizzle Operator
  topic: GPU
  code1: |
    __shared__ float smem[BLOCK_SIZE][BLOCK_SIZE + 1];
    smem[threadIdx.y][threadIdx.x ^ threadIdx.y] = data[idx];
  code2: |
    __shared__ float smem[BLOCK_SIZE][BLOCK_SIZE];
    smem[threadIdx.y][threadIdx.x] = data[idx];
  answer: 1
  faster_factor: 4
  explain: |
    GPU shared memory is divided into 32 banks. When multiple threads in a warp access different
    addresses in the same bank, the accesses are serialized (bank conflict).

    The swizzle operator (XOR-based index transformation) remaps memory addresses so that
    threads in a warp access different banks, even for column-wise access patterns. This is
    particularly important for matrix transpose and GEMM operations.

    The traditional workaround of padding (e.g., NxN+1 instead of NxN) wastes shared
    memory. Swizzling achieves conflict-free access without wasting memory.

    References:

    - [NVIDIA - Shared Memory Bank Conflicts](https://docs.nvidia.com/cuda/cuda-c-programming-guide/index.html#shared-memory-5-x)
    - [CUTLASS - Swizzle](https://github.com/NVIDIA/cutlass)
- title: Kernel Fusion
  topic: GPU
  code1: |
    __global__ void fused(float* data, int N) {
      int idx = blockIdx.x * blockDim.x + threadIdx.x;
      float x = data[idx];
      x = x * 2.0f + 1.0f;   // op1
      x = sqrtf(x);           // op2
      data[idx] = x;
    }
  code2: |
    __global__ void op1(float* data, int N) {
      int idx = blockIdx.x * blockDim.x + threadIdx.x;
      data[idx] = data[idx] * 2.0f + 1.0f;
    }
    __global__ void op2(float* data, int N) {
      int idx = blockIdx.x * blockDim.x + threadIdx.x;
      data[idx] = sqrtf(data[idx]);
    }
  answer: 1
  faster_factor: 2
  explain: |
    Kernel fusion combines multiple operations into a single kernel, reducing memory round-trips.
    Each separate kernel must read data from global memory and write results back. A fused kernel
    keeps intermediate values in registers, avoiding the global memory write-read between steps.

    For memory-bound operations, fusion can nearly double throughput by halving memory accesses.
    However, fusion increases register pressure and may reduce occupancy, so there's a tradeoff.

    Frameworks like PyTorch and TensorFlow heavily rely on kernel fusion (via torch.compile,
    XLA) to achieve good GPU performance.

    References:

    - [NVIDIA - Kernel Fusion](https://developer.nvidia.com/blog/optimizing-gpu-performance-tensor-cores/)
    - [Wikipedia - Loop Fusion](https://en.wikipedia.org/wiki/Loop_fission_and_fusion)
- title: Kernel Fission
  topic: GPU
  code1: |
    __global__ void compute(float* out, float* in, int N) {
      int idx = blockIdx.x * blockDim.x + threadIdx.x;
      out[idx] = heavy_compute(in[idx]);
    }
    __global__ void scatter(float* dst, float* src, int* map, int N) {
      int idx = blockIdx.x * blockDim.x + threadIdx.x;
      dst[map[idx]] = src[idx];
    }
  code2: |
    __global__ void combined(float* dst, float* in, int* map, int N) {
      int idx = blockIdx.x * blockDim.x + threadIdx.x;
      dst[map[idx]] = heavy_compute(in[idx]);
    }
  answer: 1
  faster_factor: 1.5
  explain: |
    Kernel fission is the opposite of fusion: splitting one kernel into multiple specialized
    kernels. This can help when a kernel has both compute-heavy and memory-heavy parts with
    different resource requirements.

    By splitting, each kernel can be tuned independently: the compute kernel can use more
    registers and higher occupancy for compute, while the scatter kernel can optimize for
    memory access patterns. The scheduler can also better overlap different resource types.

    Fission is beneficial when the combined kernel has poor occupancy due to high register
    usage, or when different parts of the kernel have fundamentally different access patterns.

    References:

    - [Wikipedia - Loop Fission](https://en.wikipedia.org/wiki/Loop_fission_and_fusion)
    - [NVIDIA - Occupancy](https://docs.nvidia.com/cuda/cuda-c-best-practices-guide/index.html#occupancy)
- title: Pipelining
  topic: RTL
  wip: true
  code1: |
    // Combinational: 1 cycle, fmax ~ 100 MHz
    always @(posedge clk) begin
      result <= (a * b + c) * d;
    end
  code2: |
    // 3-stage pipeline: 3 cycles, fmax ~ 300 MHz
    always @(posedge clk) begin
      stage1 <= a * b;
      stage2 <= stage1 + c;
      result <= stage2 * d;
    end
  answer: 1
  faster_factor: 1
  explain: |
    Latency = cycles / fmax. The combinational version completes in 1 cycle but at a lower
    clock frequency (long critical path through two multipliers and an adder). The pipelined
    version takes 3 cycles but at ~3x higher fmax.

    In this case, `1 / 100MHz = 10ns` vs `3 / 300MHz = 10ns` — the latencies are roughly equal.
    However, the pipelined version has ~3x higher **throughput** (one result per cycle at 300MHz
    vs one per cycle at 100MHz).

    Pipelining trades latency (more cycles) for throughput (higher fmax). Choose based on
    whether your design is latency-sensitive or throughput-sensitive.

    References:

    - [Wikipedia - Instruction Pipelining](https://en.wikipedia.org/wiki/Instruction_pipelining)
    - [FPGA4Fun - Pipelining](https://www.fpga4fun.com/PipelineStages.html)
- title: Removing Pipeline Register
  topic: RTL
  wip: true
  code1: |
    // 2-stage: 2 cycles, fmax ~ 500 MHz
    always @(posedge clk) begin
      temp <= a + b;
      result <= temp * c;
    end
  code2: |
    // Single cycle: 1 cycle, fmax ~ 200 MHz
    always @(posedge clk) begin
      result <= (a + b) * c;
    end
  answer: 2
  faster_factor: 1.25
  explain: |
    Removing a pipeline register reduces cycle count from 2 to 1, but also lowers fmax because
    the critical path now includes both the adder and multiplier.

    Latency comparison: `2 / 500MHz = 4ns` vs `1 / 200MHz = 5ns`. The pipelined version
    actually has slightly lower latency here because the fmax improvement more than compensates
    for the extra cycle.

    However, this depends on the specific logic. If removing the register only drops fmax by
    less than 2x, the single-cycle version wins on latency. The tradeoff also depends on whether
    other parts of the design constrain fmax anyway.

    References:

    - [Wikipedia - Pipeline Stall](https://en.wikipedia.org/wiki/Pipeline_stall)
- title: Register Layers
  topic: RTL
  wip: true
  code1: |
    // 2 register layers
    always @(posedge clk) begin
      r1 <= a + b + c;
      result <= r1 + d + e;
    end
  code2: |
    // 4 register layers
    always @(posedge clk) begin
      r1 <= a + b;
      r2 <= r1 + c;
      r3 <= r2 + d;
      result <= r3 + e;
    end
  answer: 1
  faster_factor: 1.3
  explain: |
    More register layers means more pipeline stages: higher fmax but more cycles.

    With 2 layers at fmax ~400MHz: latency = `2 / 400MHz = 5ns`.
    With 4 layers at fmax ~600MHz: latency = `4 / 600MHz = 6.7ns`.

    Each additional register layer has diminishing returns on fmax improvement (due to
    register setup/hold time overhead), while linearly increasing cycle count. Beyond a
    certain point, adding more layers hurts latency.

    The optimal number of pipeline stages depends on the target clock constraint and
    the logic depth of the combinational path.

    References:

    - [Xilinx - Pipelining](https://docs.amd.com/r/en-US/ug901-vivado-synthesis/Pipelining)
- title: Register Balancing
  topic: RTL
  wip: true
  code1: |
    // Unbalanced: stage 1 is the bottleneck
    always @(posedge clk) begin
      // Stage 1: multiply + add (slow, 8ns)
      temp <= a * b + c;
      // Stage 2: add only (fast, 2ns)
      result <= temp + d;
    end
  code2: |
    // Balanced: both stages ~5ns
    always @(posedge clk) begin
      // Stage 1: multiply only (5ns)
      temp <= a * b;
      // Stage 2: add + add (5ns)
      result <= temp + c + d;
    end
  answer: 2
  faster_factor: 1.6
  explain: |
    Both designs have 2 pipeline stages, so cycle count is the same. But fmax is limited by
    the **slowest** stage. In the unbalanced version, stage 1 takes 8ns → fmax = 125MHz.
    In the balanced version, both stages take 5ns → fmax = 200MHz.

    Latency: `2 / 125MHz = 16ns` vs `2 / 200MHz = 10ns`. Balancing gives 1.6x lower latency
    with the same number of pipeline stages.

    Register balancing (also called retiming) can be done manually or by synthesis tools.
    Most FPGA synthesis tools have a retiming optimization pass that automatically moves
    registers to balance pipeline stages.

    References:

    - [Wikipedia - Retiming](https://en.wikipedia.org/wiki/Retiming)
    - [Xilinx - Retiming](https://docs.amd.com/r/en-US/ug901-vivado-synthesis/Retiming)
- title: Control-based Logic Reuse
  topic: RTL
  wip: true
  code1: |
    // Dedicated: two multipliers, 1 cycle
    always @(posedge clk) begin
      result1 <= a * b;
      result2 <= c * d;
    end
  code2: |
    // Shared: one multiplier, time-multiplexed, 2 cycles
    always @(posedge clk) begin
      if (phase == 0) begin
        mult_out <= a * b;
        phase <= 1;
      end else begin
        mult_out <= c * d;
        phase <= 0;
      end
    end
  answer: 1
  faster_factor: 2
  explain: |
    Both designs run at similar fmax (the mux adds negligible delay). The dedicated version
    completes both multiplications in 1 cycle, while the shared version takes 2 cycles.

    Latency: `1 / fmax` vs `2 / fmax` = 2x difference.

    However, the shared version uses only one multiplier instead of two, saving significant
    area (multipliers are expensive in FPGAs). This is a classic **area vs latency** tradeoff.

    Control-based reuse is common when area is constrained and throughput requirements allow
    time-multiplexing. DSP blocks on FPGAs are limited, so sharing them is often necessary.

    References:

    - [Wikipedia - Resource Sharing](https://en.wikipedia.org/wiki/Resource_sharing_(computer_architecture))
- title: Priority Encoders
  topic: RTL
  wip: true
  code1: |
    // Chain priority: O(N) critical path
    assign out = req[0] ? 3'd0 :
                 req[1] ? 3'd1 :
                 req[2] ? 3'd2 :
                 req[3] ? 3'd3 :
                 req[4] ? 3'd4 :
                 req[5] ? 3'd5 :
                 req[6] ? 3'd6 :
                 req[7] ? 3'd7 : 3'd0;
  code2: |
    // Tree priority: O(log N) critical path
    wire [1:0] lo, hi;
    wire lo_valid, hi_valid;
    prio4 prio_lo(.req(req[3:0]), .out(lo),
                  .valid(lo_valid));
    prio4 prio_hi(.req(req[7:4]), .out(hi),
                  .valid(hi_valid));
    assign out = lo_valid ? {1'b0, lo}
                          : {1'b1, hi};
  answer: 2
  faster_factor: 1.5
  explain: |
    Both are combinational (1 cycle), so the difference is purely in fmax.

    The chain encoder has O(N) logic depth — each ternary operator depends on the previous one.
    With 8 inputs, the critical path goes through 8 levels of muxes.

    The tree encoder splits inputs into halves, encodes each half independently, then merges.
    This gives O(log N) depth — only 3 levels for 8 inputs.

    Latency: `1 / fmax_chain` vs `1 / fmax_tree`. The tree version has ~1.5x higher fmax due
    to the shorter critical path, giving proportionally lower latency.

    This matters more at scale: for 64-bit priority encoding, chain has 64 levels while
    tree has only 6.

    References:

    - [Wikipedia - Priority Encoder](https://en.wikipedia.org/wiki/Priority_encoder)
