  code_url: https://github.com/hgminh95/fast/blob/main/bench/cpp/loop_reorder.cpp
  explain: |
    C/C++ stores 2D arrays in row-major order: `matrix[i][j]` and `matrix[i][j+1]` are adjacent
    in memory. Row-major traversal accesses memory sequentially, making full use of each cache
    line and enabling hardware prefetching.

    Column-major traversal jumps between rows on each access, causing a cache miss for every
    element when the matrix is large enough. Each access loads a full cache line (64 bytes) but
    only uses 4 bytes of it before moving to a different cache line.

    This is one of the most impactful optimizations in numerical computing. The fix is simple:
    swap the loop order so the inner loop iterates over the contiguous dimension.

    References:

    - [Wikipedia - Row- and Column-Major Order](https://en.wikipedia.org/wiki/Row-_and_column-major_order)
