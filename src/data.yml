  code_url: https://github.com/hgminh95/fast/blob/main/bench/memory/write.cpp
  explain: |
    When writing to a cache line that is not already in cache, the CPU normally performs a
    Read-For-Ownership (RFO): it reads the entire 64-byte cache line from memory first, then
    modifies the requested bytes. This is necessary because the CPU needs the other bytes in
    the line to remain intact.

    When writing an entire cache line, the read is unnecessary since every byte will be
    overwritten. The CPU (via Enhanced REP MOVSB/STOSB, or ERMS) can detect full cache line
    writes and skip the RFO, saving memory bandwidth. This effectively halves the memory
    traffic per cache line: from read + writeback to just writeback.

    The effect is modest in this benchmark because memory bandwidth is the bottleneck for both
    cases. The benefit is larger on workloads where RFO traffic competes with other memory
    accesses.

    References:

    - [Intel - Enhanced REP MOVSB/STOSB](https://www.intel.com/content/www/us/en/architecture-and-technology/64-ia-32-architectures-optimization-manual.html)
    - [Travis Downs - Write-Combining](https://travisdowns.github.io/blog/2020/05/13/intel-zero-opt.html)
