  machine: AMD Ryzen 9
  code_url: https://github.com/hgminh95/fast/blob/main/bench/memory/recharge.cpp
  explain: |
    DRAM stores data as electrical charges in capacitors. After reading a row, the data is
    temporarily held in a row buffer. Accessing the same row again (row buffer hit) is fast.
    Accessing a different row requires precharging (closing) the current row and activating
    the new one, adding significant latency.

    Sequential access naturally exploits row buffer locality. Large strides that cross row
    boundaries cause row buffer misses, requiring the full precharge-activate-read cycle.

    References:

    - [Wikipedia - DRAM Row Buffer](https://en.wikipedia.org/wiki/Dynamic_random-access_memory#Memory_timing)
    - [What Every Programmer Should Know About Memory](https://people.freebsd.org/~lstewart/articles/cpumemory.pdf)
