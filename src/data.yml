  machine: AMD Ryzen 9
  code_url: https://github.com/hgminh95/fast/blob/main/bench/memory/write.cpp
  explain: |
    Normal stores to a cold cache line trigger a Read-For-Ownership (RFO): the CPU reads the
    entire 64-byte cache line from memory, modifies it, then eventually writes it back. This
    doubles memory traffic — 128 bytes moved per 64 bytes written.

    Non-temporal (streaming) stores bypass the cache entirely and write directly to memory
    via write-combining buffers, eliminating the RFO read. In theory this gives 2x bandwidth.
    In practice, the gain is ~17% on AMD Zen because the memory controller optimizes RFO
    handling efficiently.

    The benefit is larger on Intel CPUs (~1.5-2x) and when cache pollution from normal writes
    would evict other useful data. Non-temporal writes are used extensively in `memset`,
    `memcpy`, and SIMD-heavy workloads like video encoding.

    References:

