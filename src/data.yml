  code_url: https://github.com/hgminh95/fast/blob/main/bench/memory/recharge.cpp
  explain: |
    DRAM is organized into banks, each with a row buffer. Accessing data in the currently open
    row (row buffer hit) is fast. Accessing a different row requires closing the current row
    and opening the new one (row buffer miss/conflict), which adds significant latency.

    Sequential access benefits from row buffer locality. Strided access that jumps between
    rows in the same bank causes repeated row buffer misses.

    References:

    - [Wikipedia - DRAM](https://en.wikipedia.org/wiki/Dynamic_random-access_memory)
    - [What Every Programmer Should Know About Memory](https://people.freebsd.org/~lstewart/articles/cpumemory.pdf)
