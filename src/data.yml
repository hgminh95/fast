  code_url: https://github.com/hgminh95/fast/blob/main/bench/cpu/async.cpp
  explain: |
    Modern CPUs can have multiple outstanding memory requests in flight simultaneously. This is
    called Memory-Level Parallelism (MLP). A single pointer chase chain can only have one
    outstanding cache miss at a time (since each load depends on the previous one).

    With two independent chains, the CPU can issue loads from both chains simultaneously,
    overlapping the latency. In theory, two chains should take the same wall time as one chain,
    effectively doubling throughput. In practice, the benefit depends on the number of Line Fill
    Buffers (LFBs) available and cache interference between the chains.

    References:

    - [Algorithmica - Memory-Level Parallelism](https://en.algorithmica.org/hpc/cpu-cache/mlp/)
    - [Wikipedia - Memory-Level Parallelism](https://en.wikipedia.org/wiki/Memory-level_parallelism)
