  answer: 1
  faster_factor: '1'
  machine: AMD Ryzen 9
  code_url: https://github.com/hgminh95/fast/blob/main/bench/cpp/function_call.cpp
  explain: |
    Surprisingly, virtual function calls can be nearly as fast as regular function calls on
    modern CPUs. The vtable lookup adds an extra level of indirection, but with only one derived
    type, the CPU's branch predictor quickly learns the target address.

    The real cost of virtual functions is not the indirect call itself, but:

    - **Inlining prevention**: virtual calls cannot be inlined (unless devirtualized by the compiler)
    - **Cache pressure**: the vtable pointer adds 8 bytes per object
    - **Optimization barriers**: the compiler cannot see through the indirection to optimize

    The benchmarked difference is negligible because both `noinline` function and virtual call
    pay the same call overhead. The key takeaway: prefer inlining over worrying about virtual vs non-virtual.

    References:

    - [Wikipedia - Virtual Method Table](https://en.wikipedia.org/wiki/Virtual_method_table)
